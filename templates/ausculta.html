<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Ausculta Cardíaca (Frequência Unificada)</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --danger: #e74c3c;
            --success: #27ae60;
            --rub: #8e44ad;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --border: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--primary);
        }

        /* --- CONTROLES DE ÁUDIO --- */
        .audio-controls {
            background: #2c3e50;
            color: white;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .btn-audio {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        .btn-play { background-color: #27ae60; color: white; }
        .btn-play:hover { background-color: #219150; transform: scale(1.05); }
        
        .btn-stop { background-color: #c0392b; color: white; }
        .btn-stop:hover { background-color: #a93226; }

        .status-led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #555;
            transition: background-color 0.2s;
        }
        .status-led.playing { background-color: #00ff00; box-shadow: 0 0 10px #00ff00; }

        /* --- LAYOUT GRID --- */
        .main-grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            align-items: start;
        }

        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
        }

        /* --- CARDS E INPUTS --- */
        .controls-panel {
            background: var(--bg);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .card h3 {
            margin-top: 0;
            font-size: 1rem;
            color: var(--secondary);
            border-bottom: 2px solid var(--bg);
            padding-bottom: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-group { margin-bottom: 12px; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #7f8c8d;
        }

        select, input[type="range"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 0.9rem;
            background: #fff;
        }

        .checkbox-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 5px;
        }
        
        .check-item {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            background: #f8f9fa;
            padding: 6px 12px;
            border-radius: 15px;
            border: 1px solid #eee;
            cursor: pointer;
        }
        .check-item input { margin-right: 6px; }
        .check-item.rub-item { border-color: var(--rub); color: var(--rub); font-weight: bold; }

        .btn {
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }

        .btn-add {
            background-color: var(--accent);
            color: white;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .btn-remove {
            background-color: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 4px 8px;
            font-size: 0.8rem;
            width: auto;
        }
        .btn-reset {
            background-color: var(--secondary);
            color: white;
            margin-top: 20px;
        }

        /* --- CANVAS --- */
        .canvas-wrapper {
            position: sticky;
            top: 100px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        canvas {
            width: 100%;
            height: auto;
            background-color: #fff0f0;
            background-image: 
                linear-gradient(#ffcccc 1px, transparent 1px),
                linear-gradient(90deg, #ffcccc 1px, transparent 1px);
            background-size: 20px 20px;
            border: 1px solid #333;
        }

        .legend {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #666;
            text-align: center;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .murmur-card {
            border-left: 4px solid var(--accent);
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body>

    <div class="audio-controls">
        <div id="statusLed" class="status-led"></div>
        <button class="btn-audio btn-play" onclick="toggleAudio()">
            <span id="playIcon">▶</span> <span id="playText">Reproduzir Ausculta</span>
        </button>
        <div style="font-size: 0.9rem; opacity: 0.8; margin-left: 15px;">
            BPM: 75
        </div>
    </div>

    <div class="main-grid">
        
        <div class="controls-panel">
            
            <div class="card">
                <h3>Bulhas Principais</h3>
                
                <div class="input-group">
                    <label>B1 (Mitral/Tricúspide)</label>
                    <div style="display:flex; gap:5px;">
                        <select id="s1-intensity" onchange="draw()">
                            <option value="1">Normofonética</option>
                            <option value="0.5">Hipofonética</option>
                            <option value="2.0">Hiperfonética</option>
                        </select>
                        <select id="s1-split" onchange="draw()">
                            <option value="none">Única</option>
                            <option value="split">Desdobrada</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>B2 (Aórtico/Pulmonar)</label>
                    <div style="display:flex; gap:5px;">
                        <select id="s2-intensity" onchange="draw()">
                            <option value="1">Normofonética</option>
                            <option value="0.5">Hipofonética</option>
                            <option value="2.0">Hiperfonética</option>
                        </select>
                        <select id="s2-split" onchange="draw()">
                            <option value="none">Única</option>
                            <option value="physiologic">Fisiológico</option>
                            <option value="fixed">Persistente Fixo</option>
                            <option value="wide">Persistente Amplo</option>
                            <option value="paradoxical">Paradoxal</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>Sons Adicionais</h3>
                <div class="checkbox-row">
                    <label class="check-item"><input type="checkbox" id="systolic-click" onchange="draw()"> Clique Ejeção</label>
                    <label class="check-item"><input type="checkbox" id="opening-snap" onchange="draw()"> Estalido Abertura</label>
                    <label class="check-item"><input type="checkbox" id="s3-sound" onchange="draw()"> B3 (Protodiástole)</label>
                    <label class="check-item"><input type="checkbox" id="s4-sound" onchange="draw()"> B4 (Pré-sistole)</label>
                </div>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
                <div class="checkbox-row">
                    <label class="check-item rub-item"><input type="checkbox" id="friction-rub" onchange="draw()"> Atrito Pericárdico</label>
                </div>
            </div>

            <div id="murmurs-container"></div>

            <button class="btn btn-add" onclick="addMurmur()">+ Adicionar Sopro</button>
            <button class="btn btn-reset" onclick="resetAll()">Resetar Tudo</button>
        </div>

        <div class="canvas-wrapper">
            <canvas id="pcgCanvas" width="900" height="350"></canvas>
            <div class="legend">
                <strong>Legenda Visual:</strong><br>
                <span style="color:#2c3e50">█ B1/B2</span> | 
                <span style="color:#27ae60">█ B3/B4 (Telediástole/Pré-sistole)</span> | 
                <span style="color:#d35400">▮ Cliques</span> | 
                <span style="color:#3498db">〰 Sopro</span> | 
                <span style="color:#8e44ad">〰 Atrito</span>
            </div>
        </div>
    </div>

    <script>
        // --- VARIÁVEIS GLOBAIS ---
        let canvas, ctx;
        const cycleLength = 800; 
        
        // POSICIONAMENTO CENTRALIZADO
        const s1PosVisual = 250; 
        const s2PosVisual = 550; 
        const centerLineY = 175;
        let murmurIdCounter = 0;

        // Áudio
        let audioCtx;
        let isPlaying = false;
        let nextNoteTime = 0.0;
        let timerID = null;
        let lookahead = 25.0; 
        let scheduleAheadTime = 0.1;

        // --- INICIALIZAÇÃO ---
        window.onload = function() {
            canvas = document.getElementById('pcgCanvas');
            if (canvas) {
                ctx = canvas.getContext('2d');
                draw();
            }
        };

        // --- SISTEMA DE ÁUDIO ---
        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function toggleAudio() {
            initAudio();
            isPlaying = !isPlaying;
            
            const btn = document.querySelector('.btn-play');
            const led = document.getElementById('statusLed');
            const txt = document.getElementById('playText');
            const icon = document.getElementById('playIcon');

            if (isPlaying) {
                nextNoteTime = audioCtx.currentTime;
                scheduler();
                led.classList.add('playing');
                btn.style.backgroundColor = '#c0392b';
                txt.innerText = "Parar";
                icon.innerText = "⏹";
            } else {
                window.clearTimeout(timerID);
                led.classList.remove('playing');
                btn.style.backgroundColor = '#27ae60';
                txt.innerText = "Reproduzir";
                icon.innerText = "▶";
            }
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
                scheduleCycle(nextNoteTime);
                nextNoteTime += (cycleLength / 1000); 
            }
            timerID = window.setTimeout(scheduler, lookahead);
        }

        // Sintetizadores
        function playTone(time, freq, duration, amp, type = 'sine') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            
            const compressor = audioCtx.createDynamicsCompressor();
            osc.connect(gain);
            gain.connect(compressor);
            compressor.connect(audioCtx.destination);

            // Envelope
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(amp, time + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, time + duration);

            osc.start(time);
            osc.stop(time + duration + 0.1);
        }

        function playNoise(time, duration, amp, shape, isRub = false) {
            const bufferSize = audioCtx.sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            
            const filter = audioCtx.createBiquadFilter();
            if (isRub) {
                filter.type = 'bandpass';
                filter.frequency.value = 500; 
                filter.Q.value = 1.0; 
            } else {
                filter.type = 'lowpass';
                filter.frequency.value = 800; 
            }

            const gain = audioCtx.createGain();
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            const tStart = time;
            const tEnd = time + duration;
            const tMid = time + (duration / 2);

            gain.gain.setValueAtTime(0, tStart);
            
            if (isRub) {
                // Atrito: Envelope linear rápido
                gain.gain.linearRampToValueAtTime(amp, tStart + 0.05);
                gain.gain.linearRampToValueAtTime(amp, tEnd - 0.05);
                gain.gain.linearRampToValueAtTime(0, tEnd);
            } else {
                switch(shape) {
                    case 'crescendo-decrescendo':
                        gain.gain.linearRampToValueAtTime(amp, tMid);
                        gain.gain.linearRampToValueAtTime(0, tEnd);
                        break;
                    case 'plateau':
                        gain.gain.linearRampToValueAtTime(amp, tStart + 0.05);
                        gain.gain.linearRampToValueAtTime(amp, tEnd - 0.05);
                        gain.gain.linearRampToValueAtTime(0, tEnd);
                        break;
                    case 'decrescendo':
                        // Começa forte, termina fraco (Linear para garantir fade-out audível)
                        gain.gain.setValueAtTime(0, tStart);
                        gain.gain.linearRampToValueAtTime(amp, tStart + 0.02); // Ataque rápido
                        gain.gain.linearRampToValueAtTime(0, tEnd); // Fade out linear
                        break;
                    case 'crescendo':
                        gain.gain.linearRampToValueAtTime(amp, tEnd);
                        gain.gain.setValueAtTime(0, tEnd + 0.05);
                        break;
                    default:
                        gain.gain.linearRampToValueAtTime(amp, tMid);
                        gain.gain.linearRampToValueAtTime(0, tEnd);
                }
            }
            noise.start(time);
        }

        // AGENDAMENTO DE ÁUDIO
        function scheduleCycle(startTime) {
            const msToSec = val => val / 1000;
            const s1Time = startTime;
            const s2Time = startTime + msToSec(300);
            const cycleEnd = startTime + msToSec(cycleLength);

            // FREQUÊNCIAS PADRÃO (UNIFICADAS)
            // B1 = 120Hz, B2 = 140Hz (aproximadamente a mesma faixa)
            // Todos os extras agora usarão esta faixa (120-140Hz) e onda 'triangle'

            // 1. B1
            const s1Amp = parseFloat(document.getElementById('s1-intensity').value) * 1.5;
            const s1Split = document.getElementById('s1-split').value;
            playTone(s1Time, 120, 0.08, s1Amp, 'triangle');
            if (s1Split === 'split') {
                playTone(s1Time + 0.03, 110, 0.08, s1Amp * 0.8, 'triangle');
            }

            // 2. B2
            const s2Amp = parseFloat(document.getElementById('s2-intensity').value) * 1.5;
            const s2Split = document.getElementById('s2-split').value;
            let splitDelay = 0;
            if (s2Split === 'physiologic') splitDelay = 0.025;
            if (s2Split === 'fixed') splitDelay = 0.040;
            if (s2Split === 'wide') splitDelay = 0.055;
            
            if (s2Split === 'paradoxical') {
                playTone(s2Time, 140, 0.07, s2Amp, 'triangle');
                playTone(s2Time + 0.035, 160, 0.07, s2Amp, 'triangle');
            } else {
                playTone(s2Time, 140, 0.07, s2Amp, 'triangle');
                if (splitDelay > 0) {
                    playTone(s2Time + splitDelay, 130, 0.07, s2Amp * 0.8, 'triangle');
                }
            }

            // 3. EXTRAS (AGORA COM MESMA FREQUÊNCIA DAS BULHAS)
            
            // Clique Sistólico (Era agudo, agora = B2)
            if (document.getElementById('systolic-click').checked) {
                // Usa 140Hz e onda triangle para soar como uma bulha
                playTone(s1Time + 0.05, 140, 0.05, 0.9, 'triangle'); 
            }

            // Estalido de Abertura (Era agudo, agora = B2)
            if (document.getElementById('opening-snap').checked) {
                // Usa 140Hz e onda triangle
                playTone(s2Time + 0.06, 140, 0.05, 0.9, 'triangle');
            }
            
            // B3 (Grave, usando frequência de B1/B2)
            if (document.getElementById('s3-sound').checked) {
                // 120Hz para soar como B1 (som mais cheio)
                playTone(s2Time + 0.12, 120, 0.15, 1.8, 'triangle');
            }
            
            // B4 (Grave, usando frequência de B1/B2)
            if (document.getElementById('s4-sound').checked) {
                // 120Hz para soar como B1
                playTone(cycleEnd - 0.10, 120, 0.15, 1.8, 'triangle');
            }

            // 4. Atrito (Volume baixo mantido)
            if (document.getElementById('friction-rub').checked) {
                playNoise(s1Time + 0.08, 0.2, 0.15, 'plateau', true);
                playNoise(s2Time + 0.05, 0.15, 0.15, 'plateau', true);
                playNoise(cycleEnd - 0.1, 0.1, 0.15, 'plateau', true);
            }

            // 5. Sopros
            document.querySelectorAll('.murmur-card').forEach(card => {
                const phase = card.querySelector('.m-phase').value;
                const timing = card.querySelector('.m-timing').value;
                const shape = card.querySelector('.m-shape').value;
                const grade = (card.querySelector('.m-grade').value / 6) * 1.5;

                let mStart = 0;
                let mDur = 0;

                if (phase === 'systolic') { mStart = s1Time + 0.04; mDur = (s2Time - s1Time) - 0.04; } 
                else if (phase === 'diastolic') { mStart = s2Time + 0.04; mDur = (cycleEnd - s2Time) - 0.1; } 
                else { mStart = s1Time + 0.05; mDur = (cycleEnd - s1Time) - 0.05; }

                if (timing === 'proto') mDur = mDur * 0.4;
                if (timing === 'meso') { mStart += mDur * 0.3; mDur = mDur * 0.4; }
                if (timing === 'tele') { mStart += mDur * 0.6; mDur = mDur * 0.4; }

                playNoise(mStart, mDur, grade, shape, false);
            });
        }

        // --- SISTEMA VISUAL (CENTRALIZADO) ---

        function drawRectSound(x, amp, splitType, label) {
            if (!ctx) return;
            const rectWidth = 16; const maxH = 90;
            ctx.fillStyle = '#2c3e50';
            let components = []; 

            if (label === 'B1') {
                if (splitType === 'none') components.push({ offset: 0, scale: 1.0 });
                else { components.push({ offset: 0, scale: 1.0 }); components.push({ offset: 25, scale: 0.9 }); }
            } else {
                if (splitType === 'none') components.push({ offset: 0, scale: 1.0 });
                else if (splitType === 'physiologic') { components.push({ offset: 0, scale: 1.0 }); components.push({ offset: 20, scale: 0.9 }); }
                else if (splitType === 'fixed') { components.push({ offset: 0, scale: 1.0 }); components.push({ offset: 35, scale: 0.9 }); }
                else if (splitType === 'wide') { components.push({ offset: 0, scale: 1.0 }); components.push({ offset: 50, scale: 0.9 }); }
                else if (splitType === 'paradoxical') { components.push({ offset: 0, scale: 0.9 }); components.push({ offset: 30, scale: 1.0 }); }
            }

            components.forEach(comp => {
                const h = amp * maxH * comp.scale;
                ctx.fillRect(x + comp.offset - (rectWidth/2), centerLineY - (h/2), rectWidth, h);
            });
            ctx.fillStyle = '#e74c3c'; ctx.font = 'bold 14px Arial'; ctx.fillText(label, x - 5, centerLineY - 60);
        }

        function drawThinRect(x, amp, type, color, labelText) {
             if (!ctx) return;
             const baseH = 70;
             ctx.fillStyle = color;
             const w = (type === 'click' || type === 'snap') ? 4 : 14;
             const h = (type === 'click' || type === 'snap') ? amp*baseH : amp*baseH*0.7; 
             
             ctx.fillRect(x - w/2, centerLineY - h/2, w, h);
             ctx.font = 'bold 12px Arial';
             ctx.fillText(labelText, x - 10, centerLineY + 60);
        }

        function drawMurmurNoise(startX, endX, maxAmp, shape) {
            if (!ctx) return;
            const width = endX - startX;
            if (width <= 0) return;
            ctx.beginPath(); ctx.strokeStyle = '#3498db'; ctx.lineWidth = 1.5;
            for (let x = startX; x <= endX; x += 2) {
                let envelope = 0; let progress = (x - startX) / width;
                switch (shape) {
                    case 'plateau': envelope = 1; break;
                    case 'crescendo': envelope = progress; break;
                    case 'decrescendo': envelope = 1 - progress; break;
                    case 'crescendo-decrescendo': envelope = Math.sin(progress * Math.PI); break;
                    case 'variable': envelope = Math.random() * 0.5 + 0.5; break;
                }
                const noiseH = (Math.random() - 0.5) * maxAmp * envelope;
                ctx.moveTo(x, centerLineY); ctx.lineTo(x, centerLineY + noiseH);
            }
            ctx.stroke();
        }

        function drawFrictionRub(xStart, xEnd) {
            if (!ctx) return;
            ctx.beginPath(); ctx.strokeStyle = '#8e44ad'; ctx.lineWidth = 2;
            for (let x = xStart; x <= xEnd; x += 3) {
                const h = (Math.random() - 0.5) * 60 * (Math.random() > 0.5 ? 1 : 0.5); 
                ctx.moveTo(x, centerLineY - 10); ctx.lineTo(x, centerLineY + 10 + h);
            }
            ctx.stroke();
        }

        // FUNÇÃO DE DESENHO PRINCIPAL
        function draw() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath(); ctx.strokeStyle = '#95a5a6'; ctx.lineWidth = 1;
            ctx.moveTo(0, centerLineY); ctx.lineTo(canvas.width, centerLineY); ctx.stroke();
            
            // Marcadores
            ctx.fillStyle = "#aaa"; ctx.font = "10px Arial";
            ctx.fillText("Pré-Sistole", s1PosVisual - 60, 50);
            ctx.fillText("Sístole", s1PosVisual + 120, 50);
            ctx.fillText("Diástole", s2PosVisual + 60, 50);

            const s1Amp = parseFloat(document.getElementById('s1-intensity').value);
            const s1Split = document.getElementById('s1-split').value;
            const s2Amp = parseFloat(document.getElementById('s2-intensity').value);
            const s2Split = document.getElementById('s2-split').value;
            const hasRub = document.getElementById('friction-rub').checked;

            if (hasRub) {
                drawFrictionRub(s1PosVisual - 50, s1PosVisual - 10);
                drawFrictionRub(s1PosVisual + 60, s2PosVisual - 60);
                drawFrictionRub(s2PosVisual + 20, s2PosVisual + 120);
            }

            document.querySelectorAll('.murmur-card').forEach(card => {
                const phase = card.querySelector('.m-phase').value;
                const timing = card.querySelector('.m-timing').value;
                const shape = card.querySelector('.m-shape').value;
                const grade = card.querySelector('.m-grade').value * 15;

                let start = 0, end = 0;
                
                if (phase === 'systolic') { start = s1PosVisual + 20; end = s2PosVisual - 20; } 
                else if (phase === 'diastolic') { start = s2PosVisual + 20; end = canvas.width - 50; } 
                else if (phase === 'continuous') { start = s1PosVisual + 20; end = canvas.width - 50; }

                if (phase === 'diastolic' && timing === 'tele') {
                    drawMurmurNoise(s1PosVisual - 80, s1PosVisual - 10, grade, shape);
                }

                let duration = end - start;
                if (timing === 'proto') end = start + duration/2.5;
                if (timing === 'meso') { start += duration/4; end -= duration/4; }
                if (timing === 'tele') start = end - duration/2.5;

                drawMurmurNoise(start, end, grade, shape);
            });

            if (document.getElementById('s4-sound').checked) {
                drawThinRect(s1PosVisual - 60, 1.0, 'b4', '#27ae60', 'B4');
            }

            drawRectSound(s1PosVisual, s1Amp, s1Split, 'B1');
            if (document.getElementById('systolic-click').checked) drawThinRect(s1PosVisual + 40, 1.2, 'click', '#d35400', 'Clq');
            drawRectSound(s2PosVisual, s2Amp, s2Split, 'B2');
            if (document.getElementById('opening-snap').checked) drawThinRect(s2PosVisual + 50, 1.2, 'snap', '#d35400', 'Est');
            if (document.getElementById('s3-sound').checked) drawThinRect(s2PosVisual + 90, 1.0, 'b3', '#27ae60', 'B3');
        }

        function addMurmur() {
            murmurIdCounter++;
            const container = document.getElementById('murmurs-container');
            const card = document.createElement('div');
            card.className = 'card murmur-card';
            card.id = `murmur-${murmurIdCounter}`;
            card.innerHTML = `<h3>Sopro #${murmurIdCounter} <button class="btn btn-remove" onclick="removeMurmur('${card.id}')">Remover</button></h3>
                <div class="input-group"><label>Fase</label><select class="m-phase" onchange="draw()"><option value="systolic">Sistólico</option><option value="diastolic">Diastólico</option><option value="continuous">Contínuo</option></select></div>
                <div class="input-group"><label>Duração</label><select class="m-timing" onchange="draw()"><option value="holo">Holo</option><option value="proto">Proto</option><option value="meso">Meso</option><option value="tele">Tele (Reforço)</option></select></div>
                <div class="input-group"><label>Forma</label><select class="m-shape" onchange="draw()"><option value="crescendo-decrescendo">Diamante</option><option value="decrescendo">Decrescente</option><option value="crescendo">Crescente</option><option value="plateau">Platô</option></select></div>
                <div class="input-group"><label>Intensidade</label><input type="range" class="m-grade" min="1" max="6" value="3" oninput="draw()"></div>`;
            container.appendChild(card);
            draw();
        }
        function removeMurmur(id) { document.getElementById(id)?.remove(); draw(); }
        function resetAll() { document.querySelectorAll('select').forEach(s => s.selectedIndex = 0); document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false); document.getElementById('murmurs-container').innerHTML = ''; murmurIdCounter = 0; if(isPlaying) toggleAudio(); draw(); }
    </script>
</body>
</html>
